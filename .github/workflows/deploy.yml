      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t waeltoukebri/devops-demo-app:latest ./app

      - name: Scan Docker image with Trivy
        run: |
    # Install Trivy globally
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
    # Confirm installation
        trivy --version
    # Scan the Docker image
        trivy image waeltoukebri/devops-demo-app:latest

      - name: Scan Docker image with Trivy
        run: |
          # Install Trivy globally
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull waeltoukebri/devops-demo-app:latest
            docker stop devops-demo || true
            docker rm devops-demo || true
            docker run -d -p 80:80 --name devops-demo waeltoukebri/devops-demo-app:latest
